---
- name: Validate Grafana admin credentials
  ansible.builtin.assert:
    that:
      - monitoring_grafana_admin_user | length > 0
      - monitoring_grafana_admin_password | length >= 16
      - monitoring_grafana_admin_password != "admin"
    fail_msg: "Set grafana_admin_password in Ansible Vault before deploying monitoring."
  no_log: true

- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ monitoring_project_dir }}"
    - "{{ monitoring_project_dir }}/loki"
    - "{{ monitoring_project_dir }}/promtail"
    - "{{ monitoring_project_dir }}/prometheus"
    - "{{ monitoring_project_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_project_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_project_dir }}/grafana/dashboards"

- name: Template monitoring configuration
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ monitoring_project_dir }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  register: monitoring_config_templates
  loop:
    - src: docker-compose.yml.j2
      dest: docker-compose.yml
    - src: loki-config.yml.j2
      dest: loki/config.yml
    - src: promtail-config.yml.j2
      dest: promtail/config.yml
    - src: prometheus.yml.j2
      dest: prometheus/prometheus.yml
    - src: grafana-datasource.yml.j2
      dest: grafana/provisioning/datasources/loki.yml
    - src: grafana-dashboard-provider.yml.j2
      dest: grafana/provisioning/dashboards/default.yml
    - src: lab07-dashboard.json.j2
      dest: grafana/dashboards/lab07-logs.json

- name: Track Grafana datasource provisioning changes
  ansible.builtin.set_fact:
    monitoring_grafana_datasource_changed: >-
      {{
        monitoring_config_templates.results
        | selectattr('item.dest', 'equalto', 'grafana/provisioning/datasources/loki.yml')
        | selectattr('changed', 'equalto', true)
        | list
        | length > 0
      }}

- name: Copy Grafana metrics dashboard
  ansible.builtin.copy:
    src: grafana-app-dashboard.json
    dest: "{{ monitoring_project_dir }}/grafana/dashboards/lab08-metrics.json"
    owner: root
    group: root
    mode: "0644"

- name: Start monitoring stack with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_project_dir }}"
    project_name: "{{ monitoring_project_name }}"
    files:
      - docker-compose.yml
    pull: always
    recreate: auto
    remove_orphans: true
    state: present
    wait: true
    wait_timeout: "{{ monitoring_wait_timeout }}"

- name: Wait for Loki port to become reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ monitoring_loki_port }}"
    timeout: "{{ monitoring_wait_timeout }}"

- name: Wait for Grafana port to become reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ monitoring_grafana_port }}"
    timeout: "{{ monitoring_wait_timeout }}"

- name: Wait for Prometheus port to become reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ monitoring_prometheus_port }}"
    timeout: "{{ monitoring_wait_timeout }}"

- name: Verify Loki readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_loki_port }}/ready"
    status_code: 200
    return_content: true
  register: monitoring_loki_ready
  changed_when: false

- name: Verify Grafana health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_grafana_port }}/api/health"
    status_code: 200
    return_content: true
  register: monitoring_grafana_health
  changed_when: false

- name: Check Prometheus datasource in Grafana
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_grafana_port }}/api/datasources/uid/prometheus"
    url_username: "{{ monitoring_grafana_admin_user }}"
    url_password: "{{ monitoring_grafana_admin_password }}"
    force_basic_auth: true
    status_code:
      - 200
      - 404
    return_content: true
  register: monitoring_grafana_prometheus_datasource
  changed_when: false
  no_log: true

- name: Restart Grafana when datasource provisioning must be reloaded
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_project_dir }}"
    project_name: "{{ monitoring_project_name }}"
    files:
      - docker-compose.yml
    services:
      - grafana
    dependencies: false
    state: restarted
  when: >-
    monitoring_grafana_datasource_changed | bool
    or monitoring_grafana_prometheus_datasource.status == 404

- name: Wait for Grafana after datasource provisioning reload
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ monitoring_grafana_port }}"
    timeout: "{{ monitoring_wait_timeout }}"
  when: >-
    monitoring_grafana_datasource_changed | bool
    or monitoring_grafana_prometheus_datasource.status == 404

- name: Verify Grafana health after datasource provisioning reload
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_grafana_port }}/api/health"
    status_code: 200
    return_content: true
  register: monitoring_grafana_health
  changed_when: false
  retries: "{{ (monitoring_wait_timeout | int / 5) | round(0, 'ceil') | int }}"
  delay: 5
  until:
    - monitoring_grafana_health.status == 200
    - (monitoring_grafana_health.content | default('')) is search('"database"\\s*:\\s*"ok"')
  when: >-
    monitoring_grafana_datasource_changed | bool
    or monitoring_grafana_prometheus_datasource.status == 404

- name: Verify Prometheus datasource in Grafana
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_grafana_port }}/api/datasources/uid/prometheus"
    url_username: "{{ monitoring_grafana_admin_user }}"
    url_password: "{{ monitoring_grafana_admin_password }}"
    force_basic_auth: true
    status_code: 200
    return_content: true
  changed_when: false
  no_log: true

- name: Verify Prometheus health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_prometheus_port }}/-/healthy"
    status_code: 200
    return_content: true
  register: monitoring_prometheus_health
  changed_when: false

- name: Read Prometheus active targets
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_prometheus_port }}/api/v1/targets?state=active"
    status_code: 200
    return_content: true
  register: monitoring_prometheus_targets_response
  changed_when: false

- name: Assert monitoring services are healthy
  ansible.builtin.assert:
    that:
      - "'ready' in monitoring_loki_ready.content"
      - (monitoring_grafana_health.content | default('')) is search('"database"\\s*:\\s*"ok"')
      - "'Prometheus Server is Healthy' in monitoring_prometheus_health.content"
      - >-
        monitoring_prometheus_required_jobs
        | difference(
            monitoring_prometheus_targets_response.json.data.activeTargets
            | selectattr('health', 'equalto', 'up')
            | map(attribute='labels.job')
            | list
          )
        | length == 0
    fail_msg: "Monitoring stack did not become healthy"
