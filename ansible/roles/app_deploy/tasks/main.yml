---
- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
    registry_url: "{{ dockerhub_registry_url }}"
  when:
    - dockerhub_login_enabled | bool
    - dockerhub_username | length > 0
    - dockerhub_password | length > 0
  no_log: true

- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    source: pull

- name: Ensure application container is running
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}"
    state: started
    restart_policy: "{{ app_restart_policy }}"
    published_ports:
      - "{{ app_port }}:{{ app_container_port }}"
    env: "{{ app_environment }}"

- name: Wait for application port to become reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ app_port }}"
    timeout: "{{ app_wait_timeout }}"

- name: Verify health endpoint from the VM
  ansible.builtin.uri:
    url: "{{ app_healthcheck_url }}"
    status_code: 200
    return_content: true
  register: app_healthcheck
  changed_when: false

- name: Assert healthy application response
  ansible.builtin.assert:
    that:
      - app_healthcheck.json.status == "healthy"
    fail_msg: "Application health endpoint did not return healthy status"
