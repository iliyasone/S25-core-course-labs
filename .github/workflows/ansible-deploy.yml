name: Ansible Deployment

on:
  push:
    branches: [ master ]
    paths:
      - "app_python/**"
      - "ansible/**"
      - "!ansible/docs/**"
      - "!ansible/README.md"
      - "monitor/**"
      - "!monitor/docs/**"
      - ".github/workflows/ansible-deploy.yml"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [ master ]
    paths:
      - "ansible/**"
      - "!ansible/docs/**"
      - "!ansible/README.md"
      - "monitor/**"
      - "!monitor/docs/**"
      - ".github/workflows/ansible-deploy.yml"
  workflow_dispatch:

concurrency:
  group: ansible-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  lint:
    name: Ansible lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    env:
      ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            ansible/pyproject.toml
            ansible/uv.lock

      - name: Install controller dependencies
        run: uv sync --locked

      - name: Install required Ansible collections
        run: uv run ansible-galaxy collection install -r collections/requirements.yml

      - name: Prepare Vault password file
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          printf '%s' "$ANSIBLE_VAULT_PASSWORD" > "$RUNNER_TEMP/vault-pass"
          echo "ANSIBLE_VAULT_PASSWORD_FILE=$RUNNER_TEMP/vault-pass" >> "$GITHUB_ENV"

      - name: Run ansible-lint
        run: uv run --with ansible-lint ansible-lint playbooks/*.yml roles

      - name: Run syntax checks
        run: |
          uv run ansible-playbook -i inventory/hosts.ini --syntax-check playbooks/provision.yml
          uv run ansible-playbook -i inventory/hosts.ini --syntax-check playbooks/deploy.yml
          uv run ansible-playbook -i inventory/hosts.ini --syntax-check playbooks/deploy-monitoring.yml
          uv run ansible-playbook -i inventory/hosts.ini --syntax-check playbooks/site.yml

  detect_deploy_changes:
    name: Detect deploy changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      deploy: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.deploy }}
      wait: ${{ github.event_name == 'push' && steps.filter.outputs.python || 'false' }}
    steps:
      - name: Check out repository
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Detect changed paths
        if: github.event_name == 'push'
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          base: ${{ github.ref }}
          filters: |
            python:
              - 'app_python/**'
              - '.github/workflows/python-ci.yml'
            deploy:
              - 'app_python/**'
              - 'ansible/ansible.cfg'
              - 'ansible/pyproject.toml'
              - 'ansible/uv.lock'
              - 'ansible/group_vars/**'
              - 'ansible/inventory/**'
              - 'ansible/playbooks/**'
              - 'ansible/roles/**'
              - 'ansible/collections/**'
              - 'monitor/docker-compose.yml'
              - 'monitor/loki/**'
              - 'monitor/promtail/**'
              - 'monitor/prometheus/**'
              - 'monitor/grafana/provisioning/**'
              - 'monitor/grafana/dashboards/**'

      - name: Wait for Python CI
        if: github.event_name == 'push' && steps.filter.outputs.python == 'true'
        uses: ArcticLampyrid/action-wait-for-workflow@v1.3.0
        timeout-minutes: 20
        with:
          github_token: ${{ github.token }}
          workflow: python-ci.yml
          sha: ${{ github.sha }}
          event: push
          wait-interval: 15

  deploy:
    name: Deploy via dynamic GCP inventory
    needs:
      - lint
      - detect_deploy_changes
    if: github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || needs.detect_deploy_changes.outputs.deploy == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    env:
      ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            ansible/pyproject.toml
            ansible/uv.lock

      - name: Install controller dependencies
        run: uv sync --locked

      - name: Install required Ansible collections
        run: uv run ansible-galaxy collection install -r collections/requirements.yml

      - name: Prepare Ansible secrets
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ci"
          chmod 600 "$HOME/.ssh/id_ci"

          printf '%s' "$ANSIBLE_VAULT_PASSWORD" > "$RUNNER_TEMP/vault-pass"
          echo "ANSIBLE_VAULT_PASSWORD_FILE=$RUNNER_TEMP/vault-pass" >> "$GITHUB_ENV"
          echo "ANSIBLE_PRIVATE_KEY_FILE=$HOME/.ssh/id_ci" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: s25-devops-retake

      - name: Resolve current target from GCP
        run: |
          TARGET_HOST="$(gcloud compute instances list \
            --project='s25-devops-retake' \
            --filter='status=RUNNING AND name=lab04-vm' \
            --format='value(networkInterfaces[0].accessConfigs[0].natIP)' \
            | head -n 1)"

          if [ -z "$TARGET_HOST" ] || [ "$TARGET_HOST" = "null" ]; then
            echo "No running target VM IP was discovered from GCP" >&2
            exit 1
          fi

          ssh-keyscan -H "$TARGET_HOST" >> "$HOME/.ssh/known_hosts"
          cat > "$RUNNER_TEMP/hosts.ini" <<EOF
          [webservers]
          lab04-vm ansible_host=$TARGET_HOST ansible_user=ubuntu ansible_python_interpreter=/usr/bin/python3
          EOF
          echo "ANSIBLE_RUNTIME_INVENTORY=$RUNNER_TEMP/hosts.ini" >> "$GITHUB_ENV"
          echo "TARGET_HOST=$TARGET_HOST" >> "$GITHUB_ENV"

      - name: Run deployment playbook
        run: uv run ansible-playbook -i "$ANSIBLE_RUNTIME_INVENTORY" playbooks/deploy.yml

      - name: Verify deployment from the runner
        run: |
          curl --retry 6 --retry-all-errors --retry-delay 5 --connect-timeout 5 --max-time 15 -fsS "http://$TARGET_HOST:5000/health"
          curl --retry 6 --retry-all-errors --retry-delay 5 --connect-timeout 5 --max-time 15 -fsS "http://$TARGET_HOST:5000/" > /dev/null
          curl --retry 6 --retry-all-errors --retry-delay 5 --connect-timeout 5 --max-time 15 -fsS "http://$TARGET_HOST:3000/api/health"
