apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-python-info-service
  labels:
    app.kubernetes.io/name: devops-python-info-service
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: s25-core-course-labs
  annotations:
    kubernetes.io/change-cause: "Initial Lab 9 Kubernetes deployment"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: devops-python-info-service
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devops-python-info-service
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: s25-core-course-labs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: app
          image: iliyasone/devops-python-info-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: APP_NAME
              value: "devops-python-info-service"
            - name: APP_VERSION
              value: "2026.04-k8s"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "5000"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 3
            failureThreshold: 10
