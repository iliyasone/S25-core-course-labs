apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "python-app.fullname" . }}-test-connection"
  labels:
    {{- include "python-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: smoke-test
      image: "{{ .Values.hooks.image.repository }}:{{ .Values.hooks.image.tag }}"
      imagePullPolicy: {{ .Values.hooks.image.pullPolicy }}
      command: ["/bin/sh", "-ec"]
      args:
        - wget -qO- "http://{{ include "python-app.fullname" . }}:{{ .Values.service.port }}/health"
  restartPolicy: Never
