replicaCount: 3

app:
  component: api
  partOf: s25-core-course-labs
  containerPort: 5000

image:
  repository: iliyasone/devops-python-info-service
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

deploymentAnnotations:
  kubernetes.io/change-cause: "Managed by Helm for Lab 10"

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false

service:
  type: NodePort
  port: 80
  nodePort: 30080

env:
  APP_NAME: devops-python-info-service
  APP_VERSION: "2026.04-helm"
  HOST: "0.0.0.0"
  PORT: "5000"
  LOG_LEVEL: INFO

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 3
  failureThreshold: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

revisionHistoryLimit: 5

hooks:
  image:
    repository: busybox
    tag: "1.37"
    pullPolicy: IfNotPresent
  smokeTestRetries: 12
  smokeTestDelaySeconds: 5

volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
